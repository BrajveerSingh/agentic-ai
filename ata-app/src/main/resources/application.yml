# ============================================
# Audit Trail Agent - Application Configuration
# ============================================

spring:
  application:
    name: audit-trail-agent

  profiles:
    active: dev

  # Jackson JSON
  # Note: write-dates-as-timestamps was removed from SerializationFeature in Jackson 3.x (Spring Boot 4).
  # ISO 8601 date format is now enforced via JacksonConfig.java (JavaTimeModule).
  jackson:
    default-property-inclusion: non_null

  # ============================================
  # MCP Server (Phase 3) — custom HTTP+SSE implementation
  # Endpoints served at same port as main app (8080):
  #   GET  /mcp/sse     — SSE stream for MCP clients (e.g. Claude Desktop)
  #   POST /mcp/message — JSON-RPC 2.0 message endpoint
  #   GET  /mcp/health  — liveness probe
  #
  # Claude Desktop integration (claude_desktop_config.json):
  #   { "mcpServers": { "audit-trail-agent": { "url": "http://localhost:8080/mcp/sse" } } }
  # ============================================

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /

# Actuator / Management
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

# Logging
logging:
  level:
    root: INFO
    com.bank.ata: DEBUG
    dev.langchain4j: DEBUG
    org.springframework.ai: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

