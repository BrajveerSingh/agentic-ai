# =============================================
# Audit Trail Agent - Local Development Environment
# =============================================
#
# Usage:
#   docker-compose up -d              # Start all services
#   docker-compose logs -f ollama     # View Ollama logs
#   docker-compose down               # Stop all services
#
# Services:
#   - Ollama (LLM): http://localhost:11434
#   - PostgreSQL:   localhost:5432
#   - PgAdmin:      http://localhost:5050
#
# =============================================

services:
  # ============================================
  # ATA Gateway (external REST API)
  # ============================================
  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
    container_name: ata-gateway
    ports:
      - "8080:8080"
    environment:
      - ATA_ORCHESTRATOR_BASE_URL=http://orchestrator:8081
    depends_on:
      orchestrator:
        condition: service_started
    restart: unless-stopped

  # ============================================
  # ATA Orchestrator (agent + audit + outbound A2A/MCP)
  # ============================================
  orchestrator:
    build:
      context: .
      dockerfile: docker/Dockerfile.orchestrator
    container_name: ata-orchestrator
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=compose
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
      credit-bureau-mcp:
        condition: service_started
    restart: unless-stopped

  # ============================================
  # Ollama - Local LLM Runtime
  # ============================================
  ollama:
    image: ollama/ollama:latest
    container_name: ata-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  # ============================================
  # Ollama Model Puller (one-time setup)
  # ============================================
  ollama-pull:
    image: ollama/ollama:latest
    container_name: ata-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Pulling Llama 3 8B model..."
        ollama pull llama3:8b
        echo "Model pull complete!"
    restart: "no"

  # ============================================
  # PostgreSQL - Audit Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: ata-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: atadb
      POSTGRES_USER: ata
      POSTGRES_PASSWORD: ata_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docs/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ata -d atadb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================
  # PgAdmin - Database Management UI
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ata-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@bank.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ============================================
  # Prometheus - Metrics Collection
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: ata-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped

  # ============================================
  # Grafana - Metrics Visualization
  # ============================================
  grafana:
    image: grafana/grafana:latest
    container_name: ata-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  # ============================================
  # Mock Credit Bureau MCP Server (standalone)
  # ============================================
  credit-bureau-mcp:
    build:
      context: .
      dockerfile: docker/Dockerfile.mock-credit-bureau
    container_name: ata-credit-bureau-mcp
    ports:
      - "18081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=default
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:8080/mock/credit-bureau-mcp/health | grep UP"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  ollama_data:
    name: ata-ollama-data
  postgres_data:
    name: ata-postgres-data
  pgadmin_data:
    name: ata-pgadmin-data
  prometheus_data:
    name: ata-prometheus-data
  grafana_data:
    name: ata-grafana-data

networks:
  default:
    name: ata-network

