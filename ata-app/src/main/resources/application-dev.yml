# ============================================
# Development Profile - Local Ollama
# ============================================

spring:
  config:
    activate:
      on-profile: dev

  # H2 Database for development
  datasource:
    url: jdbc:h2:mem:atadb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

# Ollama Configuration
ollama:
  base-url: http://localhost:11434
  model: llama3:8b
  timeout: 120

# A2A Configuration
a2a:
  server:
    base-url: http://localhost:8080/a2a
  client:
    risk-agent:
      url: http://localhost:8080/mock/risk-agent/tasks/send
    fraud-agent:
      url: http://localhost:8080/mock/fraud-agent/tasks/send

# Logging - verbose for development
logging:
  level:
    root: INFO
    com.bank.ata: DEBUG
    dev.langchain4j: DEBUG
    org.springframework.web: DEBUG

