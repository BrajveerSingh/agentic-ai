# ============================================
# Production Profile - vLLM + PostgreSQL
# ============================================

spring:
  config:
    activate:
      on-profile: prod

  # PostgreSQL Database
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:atadb}
    username: ${DB_USERNAME:ata}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# vLLM Configuration
vllm:
  base-url: ${VLLM_BASE_URL:http://vllm:8000/v1}
  model: meta-llama/Llama-3-70B-Instruct
  timeout: 60

# Logging - minimal for production
logging:
  level:
    root: WARN
    com.bank.ata: INFO
    dev.langchain4j: WARN

