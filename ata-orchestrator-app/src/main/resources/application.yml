spring:
  application:
    name: ata-orchestrator

  datasource:
    url: jdbc:h2:mem:atadb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update

server:
  port: 8081

# Outbound service URLs (override in compose profile/environment)
a2a:
  client:
    risk-agent:
      url: ${A2A_RISK_AGENT_URL:http://localhost:8082/mock/risk-agent/tasks/send}
    fraud-agent:
      url: ${A2A_FRAUD_AGENT_URL:http://localhost:8083/mock/fraud-agent/tasks/send}

mcp:
  client:
    credit-bureau:
      url: ${MCP_CREDIT_BUREAU_URL:http://localhost:18081/mock/credit-bureau-mcp/message}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

